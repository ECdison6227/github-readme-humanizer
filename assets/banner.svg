<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#e5e7eb" stroke-width="1"/>
    </pattern>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#6b7280"/>
    </marker>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="480" fill="#f8fafc"/>
  <rect width="1280" height="480" fill="url(#grid)"/>

  <!-- title -->
  <text x="640" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="34" font-weight="700" fill="#1f2937">github-readme-humanizer</text>
  <text x="640" y="95" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" fill="#6b7280">让 GitHub README 读起来像真人写的</text>

  <!-- input node -->
  <g transform="translate(80, 160)">
    <rect width="260" height="130" rx="16" ry="16" fill="#ffffff" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
    <text x="130" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="16" font-weight="600" fill="#1f2937">AI 味 README</text>
    <text x="130" y="62" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">“本项目是一个高效的...</text>
    <text x="130" y="84" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">“支持多种智能识别...</text>
    <text x="130" y="106" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">占位图 + 功能清单</text>
  </g>

  <!-- skill node -->
  <g transform="translate(420, 160)">
    <rect width="320" height="160" rx="20" ry="20" fill="#ffffff" stroke="#3b82f6" stroke-width="2" filter="url(#shadow)"/>
    <text x="160" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="700" fill="#1f2937">github-readme-humanizer</text>
    <text x="160" y="68" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4b5563">1. 12 条人味自检</text>
    <text x="160" y="92" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4b5563">2. 生成 draw.io banner</text>
    <text x="160" y="116" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4b5563">3. 准备真实示例</text>
    <text x="160" y="140" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#4b5563">4. 中英双语 + 一键 Prompt</text>
  </g>

  <!-- output nodes -->
  <g transform="translate(800, 140)">
    <rect width="170" height="90" rx="14" ry="14" fill="#ffffff" stroke="#10b981" stroke-width="2" filter="url(#shadow)"/>
    <text x="85" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#1f2937">人味 README</text>
    <text x="85" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">真实故事开头</text>
  </g>

  <g transform="translate(800, 260)">
    <rect width="170" height="90" rx="14" ry="14" fill="#ffffff" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
    <text x="85" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#1f2937">示例 + banner</text>
    <text x="85" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">draw.io 流程图</text>
  </g>

  <g transform="translate(1010, 200)">
    <rect width="170" height="90" rx="14" ry="14" fill="#ffffff" stroke="#ec4899" stroke-width="2" filter="url(#shadow)"/>
    <text x="85" y="35" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="15" font-weight="600" fill="#1f2937">推送到 GitHub</text>
    <text x="85" y="60" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="13" fill="#6b7280">隐私检查通过</text>
  </g>

  <!-- arrows -->
  <line x1="340" y1="225" x2="420" y2="225" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="225" x2="800" y2="185" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="740" y1="245" x2="800" y2="305" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="970" y1="305" x2="1010" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1180" y1="245" x2="1210" y2="245" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- final output hint -->
  <text x="1220" y="222" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="600" fill="#059669">开源就绪 ✅</text>
</svg>